jobs:
  build:
    runs-on: ubuntu-latest

    permissions:
      security-events: write
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # Install Trivy
      - name: Install Trivy
        run: |
          sudo apt-get update
          sudo apt-get install -y wget
          wget -qO- https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/install.sh | sudo sh -s -- -b /usr/local/bin

      # Filesystem Scan
      - name: Run Trivy Filesystem Scan
        run: |
          trivy fs . \
            --severity HIGH,CRITICAL \
            --format sarif \
            --output trivy-fs-results.sarif

      - name: Upload FS Scan Results
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-fs-results.sarif

      # Docker Buildx
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Docker Login
      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # Build Docker Image
      - name: Build Docker Image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          load: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/nginx:${{ github.run_id }}

      # Scan Docker Image
      - name: Run Trivy Image Scan
        run: |
          trivy image \
            --severity HIGH,CRITICAL \
            --format sarif \
            --output trivy-image-results.sarif \
            ${{ secrets.DOCKERHUB_USERNAME }}/nginx:${{ github.run_id }}

      - name: Upload Image Scan Results
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-image-results.sarif

      # Fail pipeline only if HIGH/CRITICAL vulnerabilities exist
      - name: Check Vulnerabilities
        run: |
          trivy image \
            --severity HIGH,CRITICAL \
            --exit-code 1 \
            ${{ secrets.DOCKERHUB_USERNAME }}/nginx:${{ github.run_id }}

      # Push Docker Image
      - name: Push Docker Image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/nginx:${{ github.run_id }}
