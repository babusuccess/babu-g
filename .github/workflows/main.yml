name: CI Pipeline

on:
  push:
    branches:
      - main
    paths-ignore:
      - 'project/**'
      - 'README.md'

jobs:
  build:
    runs-on: ubuntu-latest

    permissions:
      security-events: write
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # Filesystem Scan
      - name: Run Trivy Filesystem Scan
        uses: aquasecurity/trivy-action@v0.33.1
        with:
          scan-type: fs
          scan-ref: .
          format: sarif
          output: trivy-fs-results.sarif
          severity: CRITICAL,HIGH

      - name: Upload FS Scan Results
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-fs-results.sarif

      # Docker Buildx
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Docker Login
      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # Build Docker Image
      - name: Build Docker Image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          load: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/nginx:${{ github.run_id }}

      # Scan Docker Image
      - name: Scan Docker Image
        uses: aquasecurity/trivy-action@v0.33.1
        with:
          image-ref: ${{ secrets.DOCKERHUB_USERNAME }}/nginx:${{ github.run_id }}
          format: sarif
          output: trivy-image-results.sarif
          severity: CRITICAL,HIGH

      - name: Upload Image Scan Results
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-image-results.sarif

      # Fail Pipeline if Vulnerabilities Found
      - name: Fail on High/Critical Vulnerabilities
        uses: aquasecurity/trivy-action@v0.33.1
        with:
          image-ref: ${{ secrets.DOCKERHUB_USERNAME }}/nginx:${{ github.run_id }}
          severity: CRITICAL,HIGH
          exit-code: '0'

      # Push Docker Image
      - name: Push Docker Image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/nginx:${{ github.run_id }}

  update-newtag-in-helm-chart:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.TOKEN }}

      - name: Update Helm Image Tag
        run: |
          sed -i 's/tag: .*/tag: "${{ github.run_id }}"/' project/values.yaml

      - name: Commit and Push Changes
        run: |
          git config --global user.email "babusuccess@gmail.com"
          git config --global user.name "babusuccess"
          git add project/values.yaml
          git commit -m "Update image tag to ${{ github.run_id }}" || echo "No changes to commit"
          git push
