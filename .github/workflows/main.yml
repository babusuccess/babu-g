name: CI Pipeline

on:
  push:
    branches:
      - main
    paths-ignore:
      - 'project/**'
      - 'README.md'

jobs:

  build:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      security-events: write

    steps:

      - name: Checkout repository
        uses: actions/checkout@v4


      # Install Trivy
      - name: Install Trivy
        run: |
          sudo apt-get update
          sudo apt-get install -y wget curl
          curl -sfL https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/install.sh | sudo sh -s -- -b /usr/local/bin v0.65.0
          trivy --version


      # Update Trivy Database
      - name: Update Trivy Database
        run: |
          trivy image --download-db-only


      # Filesystem Security Scan
      - name: Run Trivy Filesystem Scan
        run: |
          trivy fs . \
            --severity HIGH,CRITICAL \
            --format sarif \
            --output trivy-fs-results.sarif


      - name: Upload Filesystem Scan Results
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-fs-results.sarif


      # Docker Build Setup
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3


      # Docker Hub Login
      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}


      # Build Docker Image
      - name: Build Docker Image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          load: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/nginx:${{ github.run_id }}


      # Docker Image Security Scan
      - name: Run Trivy Image Scan
        run: |
          trivy image \
            --severity HIGH,CRITICAL \
            --format sarif \
            --output trivy-image-results.sarif \
            ${{ secrets.DOCKERHUB_USERNAME }}/nginx:${{ github.run_id }}


      - name: Upload Image Scan Results
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-image-results.sarif


      # Vulnerability Check
      # Change exit-code to 1 after fixing vulnerabilities
      - name: Check Docker Image Vulnerabilities
        run: |
          trivy image \
            --severity HIGH,CRITICAL \
            --exit-code 0 \
            ${{ secrets.DOCKERHUB_USERNAME }}/nginx:${{ github.run_id }}


      # Push Image
      - name: Push Docker Image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/nginx:${{ github.run_id }}


  update-newtag-in-helm-chart:

    runs-on: ubuntu-latest

    needs: build

    steps:

      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.TOKEN }}


      - name: Update Helm Image Tag
        run: |
          sed -i 's/tag: .*/tag: "${{ github.run_id }}"/' project/values.yaml


      - name: Commit and Push Changes
        run: |
          git config --global user.email "babusuccess@gmail.com"
          git config --global user.name "babusuccess"
          git add project/values.yaml
          git commit -m "Update image tag to ${{ github.run_id }}" || echo "No changes to commit"
          git push
