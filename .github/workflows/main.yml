name: CI Pipeline

on:
  push:
    branches:
      - main
    paths-ignore:
      - 'project/**'
      - 'README.md'

env:
  IMAGE_NAME: ${{ secrets.DOCKERHUB_USERNAME }}/nginx:${{ github.run_id }}

jobs:

  build:
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:

      - name: Checkout Repository
        uses: actions/checkout@v4


      # Install Trivy
      - name: Install Trivy
        run: |
          sudo apt-get update
          sudo apt-get install -y curl
          curl -sfL https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/install.sh | sudo sh -s -- -b /usr/local/bin
          trivy --version


      # Filesystem Scan
      - name: Scan Source Code
        run: |
          trivy fs . --severity HIGH,CRITICAL


      # Docker Setup
      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3


      # Docker Login
      - name: Login DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}


      # Build Docker Image
      - name: Build Docker Image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          load: true
          tags: ${{ env.IMAGE_NAME }}


      # Docker Image Scan
      - name: Scan Docker Image
        run: |
          trivy image ${{ env.IMAGE_NAME }} --severity HIGH,CRITICAL


      # Push Image
      - name: Push Docker Image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          push: true
          tags: ${{ env.IMAGE_NAME }}


  update-newtag-in-helm-chart:

    runs-on: ubuntu-latest
    needs: build

    steps:

      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.TOKEN }}


      - name: Update Helm Image Tag
        run: |
          sed -i 's/tag: .*/tag: "${{ github.run_id }}"/' project/values.yaml


      - name: Commit And Push Changes
        run: |
          git config --global user.email "babusuccess@gmail.com"
          git config --global user.name "babusuccess"

          git add project/values.yaml

          git commit -m "Update image tag to ${{ github.run_id }}" || echo "No changes"

          git push
