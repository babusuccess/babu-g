name: CI Pipeline

on:
  push:
    branches:
      - main

env:
  IMAGE_NAME: ${{ secrets.DOCKERHUB_USERNAME }}/nginx:${{ github.run_id }}

jobs:

  build:

    runs-on: ubuntu-latest

    steps:

      - name: Checkout Code
        uses: actions/checkout@v4


      - name: Install Trivy
        run: |
          sudo apt-get update
          sudo apt-get install -y curl
          curl -sfL https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/install.sh | sudo sh -s -- -b /usr/local/bin


      - name: Scan Source Code
        run: |
          trivy fs . --severity HIGH,CRITICAL


      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3


      - name: Docker Login
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}


      - name: Build and Push Docker Image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          push: true
          tags: ${{ env.IMAGE_NAME }}


      - name: Scan Docker Image
        run: |
          trivy image ${{ env.IMAGE_NAME }} --severity HIGH,CRITICAL



  update-helm-values:

    runs-on: ubuntu-latest

    needs: build

    steps:

      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.TOKEN }}


      - name: Update Image Tag in Helm Values
        run: |
          sed -i 's/tag:.*/tag: "${{ github.run_id }}"/' project/values.yaml


      - name: Verify values.yaml
        run: |
          cat project/values.yaml


      - name: Commit and Push Changes
        run: |
          git config --global user.email "babusuccess@gmail.com"
          git config --global user.name "babusuccess"

          git pull origin main

          git add project/values.yaml

          git commit -m "Update nginx image tag to ${{ github.run_id }}" || echo "No changes"

          git push origin main
