name: CI Pipeline

on:
  push:
    branches:
      - main
    paths-ignore:
      - 'project/**'
      - 'README.md'

env:
  IMAGE_NAME: ${{ secrets.DOCKERHUB_USERNAME }}/nginx:${{ github.run_id }}

jobs:

  build:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      security-events: write

    steps:

      - name: Checkout Repository
        uses: actions/checkout@v4


      # Install Trivy
      - name: Install Trivy
        run: |
          sudo apt-get update
          sudo apt-get install -y wget curl
          curl -sfL https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/install.sh | sudo sh -s -- -b /usr/local/bin
          trivy --version


      # Trivy Filesystem Scan
      - name: Trivy Filesystem Scan
        continue-on-error: true
        run: |
          trivy fs . \
            --severity HIGH,CRITICAL \
            --format sarif \
            --output trivy-fs-results.sarif


      - name: Upload Filesystem Results
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-fs-results.sarif


      # Docker Build Setup
      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3


      # DockerHub Login
      - name: Docker Login
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}


      # Build Image
      - name: Build Docker Image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          load: true
          tags: ${{ env.IMAGE_NAME }}


      # Image Scan
      - name: Trivy Docker Image Scan
        continue-on-error: true
        run: |
          trivy image \
            --severity HIGH,CRITICAL \
            --format sarif \
            --output trivy-image-results.sarif \
            ${{ env.IMAGE_NAME }}


      - name: Upload Image Scan Results
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-image-results.sarif


      # Push Image
      - name: Push Docker Image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ env.IMAGE_NAME }}



  update-newtag-in-helm-chart:

    runs-on: ubuntu-latest

    needs: build

    steps:

      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.TOKEN }}


      - name: Update Helm Image Tag
        run: |
          sed -i 's/tag: .*/tag: "${{ github.run_id }}"/' project/values.yaml


      - name: Commit And Push Changes
        run: |
          git config --global user.email "babusuccess@gmail.com"
          git config --global user.name "babusuccess"

          git add project/values.yaml

          git commit -m "Update image tag to ${{ github.run_id }}" || echo "No changes to commit"

          git push
